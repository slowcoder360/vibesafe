name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use a current LTS version
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Run VibeSafe Scan (High Only)
      # test-data/ fixtures intentionally contain high-severity findings; exit 1 is expected.
      run: node dist/index.js scan test-data/ --high-only
      continue-on-error: true
